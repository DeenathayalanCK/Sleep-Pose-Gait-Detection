services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fatigue
      POSTGRES_PASSWORD: fatigue_secret
      POSTGRES_DB: fatigue_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fatigue -d fatigue_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432" # expose for local inspection — remove in production

  fatigue-ai:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # PostgreSQL — overrides SQLite fallback in db.py
      DATABASE_URL: postgresql://fatigue:fatigue_secret@postgres:5432/fatigue_db
    volumes:
      - ./data:/app/data # video source + snapshots
      - ./.env:/app/.env # camera config, thresholds
    depends_on:
      postgres:
        condition: service_healthy # wait for Postgres to be ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data: # persists DB across container restarts
