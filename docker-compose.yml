# docker-compose.yml — Linux native deployment
# Works on: Ubuntu, Debian, CentOS, Rocky Linux, any Docker-on-Linux host
# No WSL2, no Windows subsystem needed
#
# Deploy:
#   sudo docker compose up --build -d
#   sudo docker compose logs -f fatigue-ai

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fatigue
      POSTGRES_PASSWORD: fatigue_secret
      POSTGRES_DB: fatigue_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fatigue -d fatigue_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Remove port exposure in production — only fatigue-ai needs postgres
    # ports:
    #   - "5432:5432"

  fatigue-ai:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fatigue:fatigue_secret@postgres:5432/fatigue_db
      # Linux: disable GPU explicitly (no NVIDIA assumed)
      MEDIAPIPE_DISABLE_GPU: "1"
      OMP_NUM_THREADS: "2"
    volumes:
      # All data persisted on host — survives container rebuilds
      - ./data:/app/data
      - ./.env:/app/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Linux: set user to avoid permission issues with mounted volumes
    # Comment out if you hit permission errors — depends on your Docker setup
    # user: "1000:1000"

volumes:
  postgres_data:
